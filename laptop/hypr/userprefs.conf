# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2

# exec-once = swayidle -w timeout 600 'swaylock' timeout 900 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' timeout 1200 'systemctl suspend' # lock after 10 min, and sleep after 15 min, suspend after 20 mins // requires swayidle

monitor = ,3200x2000@120,auto,1.666667 # Resolution and scale for Asus Vivobook S 16 OLED

input {
  force_no_accel = 0 # Don't disable acceleration, otherwise touchpad sensitivity control below doesn't take effect
}

device {
  name = ascp1201:00-093a:3017-touchpad # Adjust touchpad sensitivity
  sensitivity = 0.2
}

xwayland {
    force_zero_scaling = false # Allow XWayland apps to scale
}

bind = $mainMod, Return, exec, brave # launch brave

bind = SUPER, SUPER_L, exec, pkill -x rofi || $scrPath/rofilaunch.sh d # launch application launcher
bind = $mainMod, C, exec, /usr/bin/codium --enable-features=UseOzonePlatform,WaylandWindowDecorations --ozone-platform=wayland

windowrulev2 = opacity 0.90 0.90,class:^(brave)$
windowrulev2 = opacity 0.90 0.90,class:^(codium-url-handler)$
windowrulev2 = opacity 0.80 0.80,initialTitle:^(Spotify)$
