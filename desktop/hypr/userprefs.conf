# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2

# lock after 10 min, then sleep after 15 min, then suspend after 20 mins // requires swayidle
# exec-once = swayidle -w timeout 600 'swaylock' timeout 900 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' timeout 1200 'systemctl suspend'

# Resolution and scale for desktop
monitor = ,2560x1440@120,auto,auto

# launch brave
bind = $mainMod, Return, exec, brave 

# launch rofi with super alone
bind = SUPER, SUPER_L, exec, pkill -x rofi || $scrPath/rofilaunch.sh d

# launch vscodium with wayland
bind = $mainMod, C, exec, /usr/bin/codium --enable-features=UseOzonePlatform,WaylandWindowDecorations --ozone-platform=wayland

# window rules
windowrulev2 = opacity 0.90 0.90,class:^(brave)$
windowrulev2 = opacity 0.90 0.90,class:^(codium-url-handler)$
windowrulev2 = opacity 0.80 0.80,initialTitle:^(Spotify)$
